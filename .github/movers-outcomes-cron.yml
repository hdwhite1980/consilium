name: Movers Outcomes Resolver

# Runs daily at 22:30 UTC (= 6:30pm ET during DST, 5:30pm ET during standard time)
# After US market close. Resolves pending 1-day and 3-day outcomes for
# movers flagged by the Today/Tomorrow Movers system.
#
# Safe to run daily because the endpoint:
#   - Only processes rows where flagged_date is 1-14 days old
#   - Only updates rows where outcome_1d / outcome_3d are currently NULL
#   - Uses upsert with onConflict: 'mover_id'
#   - Is idempotent — running twice the same day does nothing extra
#
# Runs every weekday. Weekend runs are safe but won't find new data since
# markets are closed Saturday/Sunday.

on:
  schedule:
    - cron: '30 22 * * 1-5'   # Mon-Fri, 22:30 UTC
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  resolve-movers-outcomes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger movers outcomes resolver
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET not configured in GitHub secrets"
            exit 1
          fi

          echo "Triggering movers outcomes resolver at $(date -u)"

          response=$(curl -sS -w "\n__HTTP_STATUS:%{http_code}__" \
            --max-time 300 \
            -X POST "https://wali-os.com/api/movers/outcomes" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json")

          body=$(echo "$response" | sed 's/__HTTP_STATUS:[0-9]*__$//')
          status=$(echo "$response" | grep -o '__HTTP_STATUS:[0-9]*__' | grep -o '[0-9]*')

          echo "HTTP Status: $status"
          echo "Response body:"
          echo "$body"

          # Accept both 200 and 202 (fire-and-forget)
          if [ "$status" != "200" ] && [ "$status" != "202" ]; then
            echo "::error::Movers outcomes resolver failed with status $status"
            exit 1
          fi

          echo "✓ Movers outcomes resolver accepted"
          echo "::notice::Check Supabase movers_outcomes for newly resolved entries in the next few minutes"
